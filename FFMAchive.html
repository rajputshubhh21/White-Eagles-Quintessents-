<style>
    /* Menu Button */
.menu-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 22px;
  background: #ff2d55;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  color: white;
  z-index: 1000;
}

/* Overlay Background */
.menu-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(5, 10, 20, 0.6);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s ease;
  z-index: 999;
}

/* Active State */
.menu-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* Menu Box */
.menu-box {
  width: 260px;
  height: 100%;
  background: rgba(10, 22, 34, 0.95);
  border-left: 1px solid rgba(0, 224, 255, 0.2);
  padding: 30px 20px;
  transform: translateX(100%);
  transition: 0.4s ease;
  display: flex;
  flex-direction: column;
}

/* Slide In */
.menu-overlay.active .menu-box {
  transform: translateX(0);
}

/* Close Button */
.close-btn {
  align-self: flex-end;
  background: #ff2d55;
  border: none;
  color: white;
  padding: 10px 14px;
  border-radius: 12px;
  margin-bottom: 20px;
  cursor: pointer;
}

/* Links */
.menu-box a {
  color: white;
  text-decoration: none;
  padding: 12px 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  transition: 0.3s;
}

/* "Hover" Effect (works on tap too) */
.menu-box a:hover,
.menu-box a:active {
  background: rgba(0, 224, 255, 0.15);
  transform: translateX(5px);
}

/* Discord Button */
.discord-btn {
  margin-top: auto;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #5865F2, #8b5cf6);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.discord-btn:hover {
  transform: scale(1.05);
}
</style>

<script>
    const menu = document.getElementById("menuOverlay");

function openMenu() {
  menu.classList.add("active");
}

function closeMenu() {
  menu.classList.remove("active");
}

// Close when clicking outside
menu.addEventListener("click", (e) => {
  if (e.target === menu) {
    closeMenu();
  }
});
</script>
